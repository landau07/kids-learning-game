<!-- Memory game screen -->
<div class="screen" id="memoryScreen">
  <h1 class="game-title">🃏 משחק זיכרון 🃏</h1>

  <div class="score-bar">
    <div class="memory-moves">
      <span>🔄</span>
      <span>ניסיונות: </span>
      <span id="movesDisplay">0</span>
    </div>
    <div class="score">
      <span>✅</span>
      <span>זוגות: </span>
      <span id="pairsDisplay">0</span>
      <span>/</span>
      <span id="totalPairsDisplay">0</span>
    </div>
  </div>

  <div class="memory-grid" id="memoryGrid"></div>
</div>
