<!-- Seasons game screen -->
<div class="screen" id="seasonsScreen">
  <h1 class="game-title">🌦️ עונות השנה 🌦️</h1>

  <div class="score-bar">
    <div class="score">
      <span>⭐</span>
      <span id="seasonsScoreDisplay">0</span>
    </div>
    <div class="stars-container" id="seasonsStarsContainer">
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
    </div>
  </div>

  <div class="seasons-area">
    <div class="seasons-item" id="seasonsItem">
      <div id="seasonsEmoji"></div>
      <div class="seasons-item-name" id="seasonsItemName"></div>
    </div>
    <div class="seasons-options" id="seasonsOptions"></div>
  </div>
</div>
