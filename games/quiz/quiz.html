<!-- Shared quiz screen for letters, math, counting games -->
<div class="screen" id="gameScreen">
  <h1 class="game-title" id="gameTitle"></h1>

  <div class="score-bar">
    <div class="score">
      <span>⭐</span>
      <span id="scoreDisplay">0</span>
    </div>
    <div class="stars-container" id="starsContainer">
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
    </div>
  </div>

  <div class="game-area">
    <div class="question-box" id="questionBox">
      <div class="question-text" id="questionText"></div>
      <div class="question-main" id="questionMain"></div>
      <div class="counting-display" id="countingDisplay"></div>
    </div>

    <div class="answers-grid" id="answersGrid"></div>

    <div class="spacebar-hint" id="spacebarHint">
      💡 אפשר גם ללחוץ על מספרים 1-4 במקלדת!
    </div>
  </div>
</div>
